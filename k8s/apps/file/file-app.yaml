apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-app
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-app
  template:
    metadata:
      labels:
        app: file-app
    spec:
      initContainers:
        - name: copy-public
          image: REGISTRY/dynadoc/file-service:latest
          command:
            - sh
            - -c
            - "cp -r /var/www/html/public/. /mnt/public/ && chown -R 33:33 /mnt/public"
          volumeMounts:
            - name: public-files
              mountPath: /mnt/public
      containers:
        - name: php-fpm
          image: REGISTRY/dynadoc/file-service:latest
          ports:
            - containerPort: 9000
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: file-db-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: file_service
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: file-db-secret
                  key: POSTGRES_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: file-app-secret
                  key: APP_KEY
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: REDIS_HOST
              value: redis-svc
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_CONNECTION
              value: redis
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.dynadoc.svc.cluster.local:9092"
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_BUCKET
              value: files
            - name: AWS_ENDPOINT
              value: http://localstack-svc.dynadoc.svc.cluster.local:4566
            - name: AWS_USE_PATH_STYLE_ENDPOINT
              value: "true"
            - name: FILESYSTEM_DISK
              value: s3
            - name: HOST_USER_SERVICE
              value: http://user-svc.dynadoc.svc.cluster.local:80
            - name: HOST_TEMPLATE_SERVICE
              value: http://template-svc.dynadoc.svc.cluster.local:80
            - name: OTEL_PHP_AUTOLOAD_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: file-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo-svc.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_PROPAGATORS
              value: baggage,tracecontext
            - name: OTEL_TRACES_EXPORTER
              value: otlp
          volumeMounts:
            - name: public-files
              mountPath: /var/www/html/public

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: file.conf
            - name: public-files
              mountPath: /var/www/html/public
              readOnly: true

      volumes:
        - name: public-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-configs
---
apiVersion: v1
kind: Service
metadata:
  name: file-svc
  namespace: dynadoc
spec:
  selector:
    app: file-app
  ports:
    - port: 80
      targetPort: 80
