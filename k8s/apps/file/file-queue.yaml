apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-queue
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-queue
  template:
    metadata:
      labels:
        app: file-queue
    spec:
      containers:
        - name: file-queue
          image: REGISTRY/dynadoc/file-service:latest
          command: ["/bin/bash", "queue-entrypoint.sh"]
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: file-db-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: file_service
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: file-db-secret
                  key: POSTGRES_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: file-app-secret
                  key: APP_KEY
            - name: APP_ENV
              value: production
            - name: REDIS_HOST
              value: redis-svc
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_CONNECTION
              value: redis
            - name: REDIS_QUEUE
              value: file-default
            - name: KAFKA_BROKERS
              value: kafka-0.kafka-headless.dynadoc.svc.cluster.local:9092
          restartPolicy: Always
