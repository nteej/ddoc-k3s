apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-app
  template:
    metadata:
      labels:
        app: user-app
    spec:
      # Copy public/ from the PHP image so nginx can serve static files
      initContainers:
        - name: copy-public
          image: REGISTRY/dynadoc/user-service:latest
          command:
            - sh
            - -c
            - "cp -r /var/www/html/public/. /mnt/public/ && chown -R 33:33 /mnt/public"
          volumeMounts:
            - name: public-files
              mountPath: /mnt/public
      containers:
        - name: php-fpm
          image: REGISTRY/dynadoc/user-service:latest
          ports:
            - containerPort: 9000
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: user-db-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: user_service
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-db-secret
                  key: POSTGRES_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: user-app-secret
                  key: APP_KEY
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: OTEL_PHP_AUTOLOAD_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: user-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo-svc.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_PROPAGATORS
              value: baggage,tracecontext
            - name: OTEL_TRACES_EXPORTER
              value: otlp
          volumeMounts:
            - name: public-files
              mountPath: /var/www/html/public

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: user.conf
            - name: public-files
              mountPath: /var/www/html/public
              readOnly: true

      volumes:
        - name: public-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-configs
---
apiVersion: v1
kind: Service
metadata:
  name: user-svc
  namespace: dynadoc
spec:
  selector:
    app: user-app
  ports:
    - port: 80
      targetPort: 80
