apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-key-app
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-key-app
  template:
    metadata:
      labels:
        app: api-key-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z api-key-db-svc 5432; do
                echo "Waiting for api-key-db..."
                sleep 2
              done
      containers:
        - name: api-key-service
          image: REGISTRY/dynadoc/api-key-service:latest
          ports:
            - containerPort: 8086
          env:
            - name: OWN_DB_HOST
              value: api-key-db-svc
            - name: OWN_DB_PORT
              value: "5432"
            - name: OWN_DB_DATABASE
              value: apikey_service
            - name: OWN_DB_USERNAME
              value: postgres
            - name: OWN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-key-db-secret
                  key: POSTGRES_PASSWORD
            - name: USER_DB_HOST
              value: user-db-svc
            - name: USER_DB_PORT
              value: "5432"
            - name: USER_DB_DATABASE
              value: user_service
            - name: USER_DB_USERNAME
              value: postgres
            - name: USER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-db-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_ADDR
              value: redis-svc:6379
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.dynadoc.svc.cluster.local:9092"
            - name: JWT_PRIVATE_KEY_PATH
              value: /etc/jwt/jwt-private.pem
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/jwt/jwt-public.pem
            - name: PORT
              value: "8086"
            - name: DEFAULT_RATE_LIMIT_PER_MINUTE
              value: "60"
            - name: DEFAULT_MONTHLY_QUOTA
              value: "1000"
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/jwt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          projected:
            sources:
              - secret:
                  name: kong-jwt-secret
                  items:
                    - key: jwt-public.pem
                      path: jwt-public.pem
              - secret:
                  name: jwt-private-secret
                  items:
                    - key: jwt-private.pem
                      path: jwt-private.pem
---
apiVersion: v1
kind: Service
metadata:
  name: api-key-svc
  namespace: dynadoc
spec:
  selector:
    app: api-key-app
  ports:
    - port: 8086
      targetPort: 8086
