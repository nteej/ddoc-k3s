apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-app
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-app
  template:
    metadata:
      labels:
        app: webhook-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z webhook-db-svc 5432; do
                echo "Waiting for webhook-db..."
                sleep 2
              done
      containers:
        - name: webhook-service
          image: REGISTRY/dynadoc/webhook-service:latest
          ports:
            - containerPort: 8085
          env:
            - name: DB_HOST
              value: webhook-db-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: webhook_service
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: webhook-db-secret
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.dynadoc.svc.cluster.local:9092"
            - name: JWT_PUBLIC_KEY_PATH
              value: /etc/jwt/jwt-public.pem
            - name: PORT
              value: "8085"
            - name: MAX_WEBHOOK_RETRIES
              value: "5"
            - name: DELIVERY_WORKERS
              value: "5"
          volumeMounts:
            - name: jwt-public
              mountPath: /etc/jwt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: jwt-public
          secret:
            secretName: kong-jwt-secret
            items:
              - key: jwt-public.pem
                path: jwt-public.pem
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-svc
  namespace: dynadoc
spec:
  selector:
    app: webhook-app
  ports:
    - port: 8085
      targetPort: 8085
