apiVersion: apps/v1
kind: Deployment
metadata:
  name: template-consumer
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: template-consumer
  template:
    metadata:
      labels:
        app: template-consumer
    spec:
      containers:
        - name: template-consumer
          image: REGISTRY/dynadoc/template-service:latest
          command: ["/bin/bash", "consumer-entrypoint.sh"]
          env:
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: template-db-svc
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: template_service
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: template-db-secret
                  key: POSTGRES_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: template-app-secret
                  key: APP_KEY
            - name: APP_ENV
              value: production
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.dynadoc.svc.cluster.local:9092"
          restartPolicy: Always
