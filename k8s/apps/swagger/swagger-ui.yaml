apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
        - name: swagger-ui
          image: swaggerapi/swagger-ui:v5.17.0
          ports:
            - containerPort: 8080
          env:
            - name: URL
              value: /openapi.yaml
            - name: BASE_URL
              value: /docs
            - name: PORT
              value: "8080"
          volumeMounts:
            - name: openapi-spec
              mountPath: /usr/share/nginx/html/openapi.yaml
              subPath: openapi.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /docs/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /docs/
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: openapi-spec
          configMap:
            name: openapi-cm
---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui-svc
  namespace: dynadoc
spec:
  selector:
    app: swagger-ui
  ports:
    - port: 8080
      targetPort: 8080
