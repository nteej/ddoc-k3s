apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-cm
  namespace: observability
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: DynaDoc System Health
        folder: "System & Infrastructure"
        folderUid: system-infra
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/system

      - name: DynaDoc Kubernetes
        folder: "Kubernetes Cluster"
        folderUid: k8s-cluster
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/kubernetes

      - name: DynaDoc Applications
        folder: "DynaDoc Flow"
        folderUid: dynadoc-apps
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards/dynadoc
