apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-cm
  namespace: observability
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: DynaDoc
        folder: DynaDoc Flow
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
