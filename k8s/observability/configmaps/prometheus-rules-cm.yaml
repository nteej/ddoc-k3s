apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules-cm
  namespace: observability
data:
  alerts.yaml: |
    groups:
      # ─────────────────────────────────────────
      # HOST / NODE HEALTH  (node_exporter)
      # ─────────────────────────────────────────
      - name: node.rules
        interval: 1m
        rules:
          - alert: NodeDown
            expr: up{job="node-exporter"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node exporter unreachable ({{ $labels.instance }})"
              description: "node_exporter on {{ $labels.instance }} has been down for >2m."

          - alert: HostHighCpuLoad
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
              description: "CPU usage has exceeded 85% for 5+ minutes."

          - alert: HostCriticalCpuLoad
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "CRITICAL CPU on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
              description: "CPU usage has exceeded 95% for 2+ minutes."

          - alert: HostOutOfMemory
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Out of memory on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}% free)"
              description: "Available memory dropped below 10% for 5+ minutes."

          - alert: HostMemoryPressure
            expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Memory pressure on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}% free)"
              description: "Available memory below 20% for 5+ minutes."

          - alert: HostDiskAlmostFull
            expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes * 100) < 15
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk almost full on {{ $labels.instance }}:{{ $labels.mountpoint }} ({{ $value | printf \"%.1f\" }}% free)"
              description: "Disk space below 15% available."

          - alert: HostDiskFull
            expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes * 100) < 5
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Disk FULL on {{ $labels.instance }}:{{ $labels.mountpoint }} ({{ $value | printf \"%.1f\" }}% free)"
              description: "Disk space below 5% — data loss risk."

          - alert: HostHighDiskIOUtilization
            expr: rate(node_disk_io_time_seconds_total[5m]) * 100 > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High disk I/O on {{ $labels.instance }} ({{ $value | printf \"%.1f\" }}%)"
              description: "Disk I/O utilization above 90% for 10+ minutes."

          - alert: HostNetworkErrors
            expr: rate(node_network_receive_errs_total[5m]) > 10 or rate(node_network_transmit_errs_total[5m]) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Network errors on {{ $labels.instance }} device {{ $labels.device }}"
              description: "Network error rate exceeds 10 errors/s."

          - alert: HostHighLoad
            expr: node_load15 / count by(instance) (count by(instance, cpu) (node_cpu_seconds_total)) > 2
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High system load on {{ $labels.instance }} (load15={{ $value | printf \"%.2f\" }})"
              description: "15-minute load average is 2x the number of CPUs."

      # ─────────────────────────────────────────
      # KUBERNETES CLUSTER HEALTH
      # ─────────────────────────────────────────
      - name: kubernetes.rules
        interval: 1m
        rules:
          - alert: KubeStateMetricsDown
            expr: up{job="kube-state-metrics"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "kube-state-metrics is down"
              description: "Cannot get Kubernetes object state — alerting for pod/deploy may be incomplete."

          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash-looping ({{ $value | printf \"%.0f\" }} restarts/15m)"
              description: "Container {{ $labels.container }} is restarting frequently."

          - alert: PodNotReady
            expr: max by(namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready ({{ $labels.phase }})"
              description: "Pod has been in non-Running phase for 10+ minutes."

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
              description: "Desired {{ $value }} replicas are not all available for 10+ minutes."

          - alert: ContainerOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Container {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} OOM killed"
              description: "Container was terminated by OOM killer. Consider increasing memory limits."

          - alert: ContainerHighCpuThrottle
            expr: rate(container_cpu_cfs_throttled_seconds_total{container!="",container!="POD"}[5m]) / rate(container_cpu_cfs_periods_total{container!="",container!="POD"}[5m]) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "CPU throttled: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} ({{ $value | printf \"%.1f\" }}%)"
              description: "Container is CPU-throttled >80% of the time. Raise CPU limits."

          - alert: PersistentVolumeClaimBound
            expr: kube_persistentvolumeclaim_status_phase{phase!="Bound"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} not bound ({{ $labels.phase }})"
              description: "PVC has not bound for 5+ minutes."

      # ─────────────────────────────────────────
      # PROMETHEUS SELF-HEALTH
      # ─────────────────────────────────────────
      - name: prometheus.rules
        interval: 1m
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus target down: {{ $labels.job }}/{{ $labels.instance }}"
              description: "Scrape target has been unreachable for 5+ minutes."

          - alert: PrometheusHighScrapeLatency
            expr: prometheus_target_interval_length_seconds{quantile="0.99"} > 60
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus slow scraping (p99={{ $value | printf \"%.1f\" }}s)"
              description: "99th-percentile scrape duration exceeds 60s — may miss data."

          - alert: PrometheusTSDBCompactionFailing
            expr: increase(prometheus_tsdb_compactions_failed_total[1h]) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus TSDB compaction failures"
              description: "TSDB compaction has failed in the last hour."

      # ─────────────────────────────────────────
      # DYNADOC APPLICATION HEALTH
      # ─────────────────────────────────────────
      - name: dynadoc.rules
        interval: 1m
        rules:
          - alert: DynaDocServiceDown
            expr: |
              count by(pod) (
                kube_pod_status_ready{namespace="dynadoc", condition="true"}
                * on(pod) group_left(label_app) kube_pod_labels{namespace="dynadoc"}
              ) == 0
              unless count by(label_app) (kube_pod_labels{namespace="dynadoc"}) == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "DynaDoc service has no ready pods: {{ $labels.label_app }}"
              description: "No ready pods for this service for 5+ minutes."

          - alert: DynaDocHighContainerMemory
            expr: container_memory_working_set_bytes{namespace="dynadoc", container!="", container!="POD"} / container_spec_memory_limit_bytes{namespace="dynadoc", container!="", container!="POD"} > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory: {{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} ({{ $value | printf \"%.1f%%\" }})"
              description: "Container using >85% of its memory limit."
