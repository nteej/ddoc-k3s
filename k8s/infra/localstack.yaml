apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: dynadoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      initContainers:
        # Create the S3 bucket on first boot
        - name: create-bucket
          image: amazon/aws-cli:latest
          command:
            - sh
            - -c
            - |
              until aws --endpoint-url=http://localhost:4566 s3 ls > /dev/null 2>&1; do
                echo "Waiting for LocalStack..."
                sleep 3
              done
              aws --endpoint-url=http://localhost:4566 s3 mb s3://files 2>/dev/null || true
              echo "Bucket ready."
          env:
            - name: AWS_ACCESS_KEY_ID
              value: test
            - name: AWS_SECRET_ACCESS_KEY
              value: test
            - name: AWS_DEFAULT_REGION
              value: us-east-1
      containers:
        - name: localstack
          image: localstack/localstack:4.7.0
          ports:
            - containerPort: 4566
          env:
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: SERVICES
              value: s3
            - name: GATEWAY_LISTEN
              value: "0.0.0.0:4566"
            - name: PERSISTENCE
              value: "true"
          volumeMounts:
            - name: localstack-data
              mountPath: /var/lib/localstack
      volumes:
        - name: localstack-data
          persistentVolumeClaim:
            claimName: localstack-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: localstack-pvc
  namespace: dynadoc
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: localstack-svc
  namespace: dynadoc
spec:
  selector:
    app: localstack
  type: NodePort
  ports:
    - port: 4566
      targetPort: 4566
      nodePort: 30566
