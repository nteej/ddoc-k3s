apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: dynadoc
spec:
  redirectScheme:
    scheme: https
    port: "443"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: www-redirect
  namespace: dynadoc
spec:
  redirectRegex:
    regex: "^https://www\\.ddoc\\.fi(.*)"
    replacement: "https://ddoc.fi${1}"
    permanent: true
---
# HTTP → HTTPS redirect for all ddoc.fi domains
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-redirect
  namespace: dynadoc
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ddoc.fi`) || Host(`www.ddoc.fi`) || Host(`api.ddoc.fi`)
      kind: Rule
      middlewares:
        - name: https-redirect
      services:
        - name: frontend-svc
          port: 80
---
# HTTP → HTTPS redirect for grafana (local middleware in observability namespace)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: observability
spec:
  redirectScheme:
    scheme: https
    port: "443"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: http-redirect-grafana
  namespace: observability
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.ddoc.fi`)
      kind: Rule
      middlewares:
        - name: https-redirect
      services:
        - name: grafana-svc
          port: 3000
---
# ddoc.fi — frontend + Kong API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddoc-ingress
  namespace: dynadoc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: ddoc.fi
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kong-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
  tls:
    - hosts:
        - ddoc.fi
---
# www.ddoc.fi — redirect to ddoc.fi
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: www-ingress
  namespace: dynadoc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: dynadoc-www-redirect@kubernetescrd
spec:
  rules:
    - host: www.ddoc.fi
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
  tls:
    - hosts:
        - www.ddoc.fi
---
# api.ddoc.fi — Kong API gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: dynadoc
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: api.ddoc.fi
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-svc
                port:
                  number: 8000
  tls:
    - hosts:
        - api.ddoc.fi
---
# grafana.ddoc.fi — Grafana dashboard
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: observability
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: grafana.ddoc.fi
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-svc
                port:
                  number: 3000
  tls:
    - hosts:
        - grafana.ddoc.fi
