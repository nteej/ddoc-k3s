---
# Headless service — enables DNS per pod: kafka-0.kafka-headless.dynadoc.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: dynadoc
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
---
# Regular ClusterIP service — bootstrap endpoint for clients
apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
  namespace: dynadoc
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: dynadoc
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
          # Extract BROKER_ID from pod ordinal (kafka-0 → 0, kafka-1 → 1, etc.)
          # Set ADVERTISED_LISTENERS using the stable StatefulSet pod DNS
          command:
            - sh
            - -c
            - |
              export KAFKA_BROKER_ID=$(echo "$HOSTNAME" | awk -F'-' '{print $NF}')
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.kafka-headless.dynadoc.svc.cluster.local:9092"
              exec /etc/confluent/docker/run
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-svc.dynadoc.svc.cluster.local:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
