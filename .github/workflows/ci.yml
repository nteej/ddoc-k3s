name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ─── PHP service tests ────────────────────────────────────────────────────

  test-user-service:
    name: Test / user-service
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'pull_request' &&
      contains(toJSON(github.event.pull_request.files.*.filename), 'backend/user-service')
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: user_service_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, mbstring, zip, bcmath, intl, pcntl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/user-service/vendor
          key: composer-user-${{ hashFiles('backend/user-service/composer.lock') }}
          restore-keys: composer-user-

      - name: Install dependencies
        working-directory: backend/user-service
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare .env
        working-directory: backend/user-service
        run: |
          cp .env.example .env 2>/dev/null || cp .env.testing .env 2>/dev/null || true
          php artisan key:generate --force
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=user_service_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=postgres/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=postgres/' .env

      - name: Run migrations
        working-directory: backend/user-service
        run: php artisan migrate --force

      - name: Run tests
        working-directory: backend/user-service
        run: php artisan test --parallel

