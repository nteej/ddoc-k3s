name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v1.0.0 or latest)"
        required: false
        default: "latest"
      service:
        description: "Service to deploy (leave empty for all)"
        required: false
        default: ""

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/dynadoc

jobs:
  # ─── Resolve the image tag ────────────────────────────────────────────────

  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ─── Build all services in parallel ─────────────────────────────────────

  build-user:
    name: Build / user-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'user'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/user-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/user-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/user-service:latest
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,mode=max,scope=user-service
          provenance: false

  build-template:
    name: Build / template-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'template'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/template-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/template-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/template-service:latest
          cache-from: type=gha,scope=template-service
          cache-to: type=gha,mode=max,scope=template-service
          provenance: false

  build-file:
    name: Build / file-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'file'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/file-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/file-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/file-service:latest
          cache-from: type=gha,scope=file-service
          cache-to: type=gha,mode=max,scope=file-service
          provenance: false

  build-audit:
    name: Build / audit-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'audit'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/audit-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/audit-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/audit-service:latest
          cache-from: type=gha,scope=audit-service
          cache-to: type=gha,mode=max,scope=audit-service
          provenance: false

  build-api-key:
    name: Build / api-key-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'api-key'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/api-key-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-key-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/api-key-service:latest
          cache-from: type=gha,scope=api-key-service
          cache-to: type=gha,mode=max,scope=api-key-service
          provenance: false

  build-webhook:
    name: Build / webhook-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'webhook'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/webhook-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/webhook-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/webhook-service:latest
          cache-from: type=gha,scope=webhook-service
          cache-to: type=gha,mode=max,scope=webhook-service
          provenance: false

  build-notification:
    name: Build / notification-service
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'notification'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend/notification-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/notification-service:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/notification-service:latest
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service
          provenance: false

  build-frontend:
    name: Build / frontend
    needs: resolve-tag
    if: github.event_name == 'release' || github.event.inputs.service == '' || github.event.inputs.service == 'frontend'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ needs.resolve-tag.outputs.tag }}
            ${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

  # ─── Rolling deploy via SSH ───────────────────────────────────────────────

  deploy:
    name: Deploy to production
    needs:
      - resolve-tag
      - build-user
      - build-template
      - build-file
      - build-audit
      - build-api-key
      - build-webhook
      - build-notification
      - build-frontend
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - name: Deploy all services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            REGISTRY="${{ env.REGISTRY }}"
            TAG="${{ needs.resolve-tag.outputs.tag }}"
            NS=dynadoc
            DISPATCH_SERVICE="${{ github.event.inputs.service || '' }}"

            echo "Deploying tag: ${TAG}"

            roll() {
              local deployment=$1 container=$2 image=$3
              echo "  → ${deployment} / ${container}"
              kubectl set image deployment/${deployment} ${container}=${image} -n ${NS}
              kubectl rollout status deployment/${deployment} -n ${NS} --timeout=300s || {
                echo "  ✗ Rollout failed — rolling back"
                kubectl rollout undo deployment/${deployment} -n ${NS}
                exit 1
              }
            }

            deploy_svc() {
              local svc=$1
              [ -z "$DISPATCH_SERVICE" ] || [ "$DISPATCH_SERVICE" = "$svc" ]
            }

            # Ensure GHCR pull secret exists for private images
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace ${NS} \
              --docker-server=ghcr.io \
              --docker-username="${{ github.repository_owner }}" \
              --docker-password="${{ secrets.GHCR_TOKEN }}" \
              --dry-run=client -o yaml | kubectl apply -f - 2>/dev/null || true

            deploy_svc user && {
              echo "==> user-service"
              roll user-app php-fpm    "${REGISTRY}/user-service:${TAG}"
              roll user-app copy-public "${REGISTRY}/user-service:${TAG}"
            }

            deploy_svc template && {
              echo "==> template-service"
              roll template-app      php-fpm            "${REGISTRY}/template-service:${TAG}"
              roll template-app      copy-public        "${REGISTRY}/template-service:${TAG}"
              roll template-consumer template-consumer  "${REGISTRY}/template-service:${TAG}"
              roll template-queue    template-queue     "${REGISTRY}/template-service:${TAG}"
            }

            deploy_svc file && {
              echo "==> file-service"
              roll file-app      php-fpm       "${REGISTRY}/file-service:${TAG}"
              roll file-app      copy-public   "${REGISTRY}/file-service:${TAG}"
              roll file-consumer file-consumer "${REGISTRY}/file-service:${TAG}"
              roll file-queue    file-queue    "${REGISTRY}/file-service:${TAG}"
            }

            deploy_svc audit && {
              echo "==> audit-service"
              roll audit-app      php-fpm        "${REGISTRY}/audit-service:${TAG}"
              roll audit-app      copy-public    "${REGISTRY}/audit-service:${TAG}"
              roll audit-consumer audit-consumer "${REGISTRY}/audit-service:${TAG}"
            }

            deploy_svc api-key && {
              echo "==> api-key-service"
              kubectl patch deployment/api-key-app -n ${NS} -p '{"spec":{"strategy":{"type":"Recreate","rollingUpdate":null}}}' 2>/dev/null || true
              roll api-key-app api-key-service "${REGISTRY}/api-key-service:${TAG}"
            }

            deploy_svc webhook && {
              echo "==> webhook-service"
              kubectl patch deployment/webhook-app -n ${NS} -p '{"spec":{"strategy":{"type":"Recreate","rollingUpdate":null}}}' 2>/dev/null || true
              roll webhook-app webhook-service "${REGISTRY}/webhook-service:${TAG}"
            }

            deploy_svc notification && {
              echo "==> notification-service"
              roll notification-app      php-fpm                "${REGISTRY}/notification-service:${TAG}"
              roll notification-app      copy-public            "${REGISTRY}/notification-service:${TAG}"
              roll notification-consumer notification-consumer  "${REGISTRY}/notification-service:${TAG}"
            }

            deploy_svc frontend && {
              echo "==> frontend"
              roll frontend frontend "${REGISTRY}/frontend:${TAG}"
            }

            echo ""
            echo "Release ${TAG} deployed successfully."
            kubectl get pods -n ${NS} --no-headers | awk '{print $1, $3}'
