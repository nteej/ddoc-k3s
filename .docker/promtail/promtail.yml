server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name (strip leading slash)
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container

      # Docker Compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Log stream (stdout / stderr)
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

      # Image name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project

    pipeline_stages:
      # Parse JSON log lines emitted by Laravel (when DD_LOGS_INJECTION was on)
      - match:
          selector: '{service=~"user-app|template-app|file-app|audit-app"}'
          stages:
            - json:
                expressions:
                  message: message
                  level: level
                  trace_id: dd.trace_id
            - labels:
                level:
                trace_id:
            - output:
                source: message
